name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main          # change this if your default branch is "master"
  workflow_dispatch:    # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Node 24.17.0 (now the GitHub Actions default) has a confirmed bug breaking
      # requests to *.googleapis.com — this forces actions back onto Node 20 to avoid it.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pin Node to a version without the googleapis fetch bug
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stamp build version (used by the site to detect new deploys)
        run: |
          echo "{\"version\": \"${{ github.sha }}\", \"deployedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > version.json
          cat version.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: yyz-stores-1a98f
          channelId: live
