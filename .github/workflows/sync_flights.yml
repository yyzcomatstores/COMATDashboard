name: Sync Porter Flights to Google Sheet
# resync: forcing GitHub to re-register the schedule trigger

on:
  schedule:
    # Runs every 15 minutes
    # For more frequent live refreshes, the website itself polls every 60s
    - cron: "*/15 * * * *"

  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run flight sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/sync_flights.py
